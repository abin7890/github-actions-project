name: CICD Pipeline

on:
push:
branches:
- main

jobs:
compile:
runs-on: self-hosted

```
steps:
  - uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: maven

  - name: Compile Application
    run: mvn compile
```

test:
runs-on: self-hosted
needs: compile

```
steps:
  - uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: maven

  - name: Run Unit Tests
    run: mvn test
```

security_checks:
runs-on: self-hosted
needs: test

```
steps:
  - uses: actions/checkout@v4

  - name: Trivy Filesystem Scan
    run: |
      trivy fs --format json -o fs-report.json .

  - name: Gitleaks Scan
    run: |
      gitleaks detect --source . \
        --report-format json \
        --report-path gitleaks-report.json

  - name: Upload Scan Reports
    uses: actions/upload-artifact@v4
    with:
      name: security-reports
      path: |
        fs-report.json
        gitleaks-report.json
```
