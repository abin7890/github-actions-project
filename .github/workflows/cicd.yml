name: CICD Pipeline

on:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: self-hosted
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile Application
        run: mvn compile

  test:
    runs-on: self-hosted
    needs: compile
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test

  security_checks:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        run: |
          trivy fs --format json --output fs-report.json .

      - name: Gitleaks Scan
        run: |
          gitleaks detect --source . --report-format json --report-path gitleaks-report.json

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            fs-report.json
            gitleaks-report.json

  build-project-and-sonar-scan:
    runs-on: self-hosted
    needs: security_checks
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

    build-docker-image-and-push:
       runs-on: self-hosted
       needs: build-project-and-sonar-scan
       steps:
         - name: Checkout Source Code
           uses: actions/checkout@v4

         - name: Download JAR artifact
           uses: actions/download-artifact@v4
           with:
          name: app-jar
          path: app

         - name: List downloaded files
           run: ls -R app

      - name: Debug Docker environment
        run: |
          docker --version || echo "Docker not found"
          docker info || echo "Docker daemon not running"
          whoami
          groups

      - name: Fix Docker permissions (if needed)
        run: |
          if ! docker info &>/dev/null; then
            echo "Attempting to fix Docker permissions..."
            sudo chmod 666 /var/run/docker.sock || true
          fi
        continue-on-error: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: abin89/bankapp:latest
